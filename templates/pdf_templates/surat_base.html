<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cetak Surat Desa</title>
    <style>
        /* Standar CSS Paged Media untuk WeasyPrint */
        @page {
            size: A4 portrait;
            margin: 2.5cm 2cm 2cm 2cm;
            
            @bottom-right {
                content: "Halaman " counter(page) " dari " counter(pages);
                font-family: 'Times New Roman', Times, serif;
                font-size: 10pt;
            }
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            font-size: 12pt;
            line-height: 1.5;
            color: black;
            background-color: white;
        }

        /* Kop Surat */
        .kop-surat {
            text-align: center;
            border-bottom: 4px double black;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .kop-surat h1, .kop-surat h2, .kop-surat p {
            margin: 0;
            padding: 0;
        }
        .kop-surat h1 { font-size: 16pt; font-weight: bold; text-transform: uppercase; }
        .kop-surat h2 { font-size: 18pt; font-weight: bold; text-transform: uppercase; }
        .kop-surat p { font-size: 11pt; }

        /* Judul Surat */
        .judul-surat {
            text-align: center;
            margin-bottom: 20px;
        }
        .judul-surat h3 {
            margin: 0;
            font-size: 14pt;
            text-decoration: underline;
            text-transform: uppercase;
        }
        .judul-surat p {
            margin: 0;
            font-size: 12pt;
        }

        /* Konten */
        .konten {
            text-align: justify;
        }
        .biodata-table {
            width: 100%;
            margin-left: 20px;
            margin-bottom: 15px;
        }
        .biodata-table td {
            padding: 3px 0;
            vertical-align: top;
        }
        .td-label { width: 30%; }
        .td-colon { width: 2%; text-align: center; }

        /* Tanda Tangan */
        .tanda-tangan {
            margin-top: 50px;
            width: 100%;
        }
        .tanda-tangan-box {
            float: right;
            width: 40%;
            text-align: center;
        }
        .tanda-tangan-space {
            height: 80px; /* Ruang kosong untuk ttd asli / stempel */
        }
        .clear { clear: both; }
    </style>
</head>
<body>

    <div class="kop-surat">
        <h1>PEMERINTAH KABUPATEN SIAK</h1>
        <h2>KECAMATAN MINAS</h2>
        <h2>KANTOR KEPALA DESA MANDIAN GAJAH</h2>
        <p>Alamat: Jl. Poros Desa Mandian Gajah, Kec. Minas, Kab. Siak, Kode Pos: 28685</p>
    </div>

    {% block content %}
    {% endblock %}

    <div class="tanda-tangan">
        <div class="tanda-tangan-box">
            <p>Mandian Gajah, {{ tanggal_cetak|date:"d F Y" }}<br>
            Kepala Desa Mandian Gajah</p>
            <div class="tanda-tangan-space"></div>
            <p><strong><u>{{ nama_kepala_desa }}</u></strong></p>
        </div>
        <div class="clear"></div>
    </div>

</body>
</html>
